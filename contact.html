<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden Luciel | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page">

    <header class="navbar">
        <div class="logo">
            <span class="dot"></span>
            <span class="name">Eden Luciel</span>
            <span class="title">Film Student & Director</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="finalindex.html">Home</a></li>
                <li><a href="edenresume.html">Resume</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="socials.html">Socials</a></li>
                <li><a href="contact.html">Contact</a></li> </ul>
        </nav>
    </header>

    <main class="contact-container">
        <div class="contact-card">
            
            <h1 class="contact-title">Let's Collab!</h1>
            <p class="contact-subtitle">Reach out for casting, crew work, or collaborations.</p>
            
            <form action="#" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Message
                    </label>
                    <textarea id="message" name="message" rows="5" placeholder="Tell me about your project!" required>
                    
                    </textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </main>
</body>
</html>
